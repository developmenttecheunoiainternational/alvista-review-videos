<!DOCTYPE html>
<html id="html-container" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: transparent;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* min-height: 100vh; */
            width: 100%;
            overflow-x: hidden;
        }

        #body-container {
            padding-top: 0px;
        }

        .testimonials-heading {
            margin: auto;
            font-family: inherit;
            text-align: center;
            font-size: 36px;
            font-weight: 600;
            color: #456900;
            margin-bottom: 30px;
            align-self: flex-start;
            max-width: 1200px;
            width: 100%;
        }

        .testimonials-heading h2 {
            /* margin: 0; */
        }

        .container-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        .container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            overflow-x: auto;
            justify-content: flex-start;
            padding: 10px 0;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
            /* Fix for mouse wheel horizontal scrolling */
            scroll-behavior: smooth;
        }

        .container::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari, Opera */
        }

        /* Navigation arrows for when there are more than 4 cards */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            border: none;
        }

        .nav-arrow.left {
            left: -20px;
        }

        .nav-arrow.right {
            right: -20px;
        }

        .nav-arrow svg {
            width: 24px;
            height: 24px;
        }

        .product-card {
            position: relative;
            width: 320px; /* 16:9 aspect ratio base width */
            flex-shrink: 0;
            border-radius: 20px;
            overflow: hidden;
            /* box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); */
            cursor: pointer;
            /* 16:9 aspect ratio */
            aspect-ratio: 9/16;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .product-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .play-button, .pause-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }

        .play-button.fade-out, .pause-button.fade-out {
            opacity: 0;
        }

        .play-button::after {
            content: "";
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-left: 20px solid #333;
            border-bottom: 12px solid transparent;
            margin-left: 5px;
        }

        .pause-button::before,
        .pause-button::after {
            content: "";
            width: 6px;
            height: 24px;
            background-color: #333;
            margin: 0 3px;
        }

        /* Improved Mobile Responsiveness with Horizontal Scroll */
        @media (max-width: 1200px) {
            .container {
                width: 100%;
                padding: 0;
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                scroll-snap-type: x mandatory;
                gap: 15px;
                padding: 10px 0;
                scrollbar-width: none;
                /* Firefox */
                -ms-overflow-style: none;
                /* IE and Edge */
            }

            .container::-webkit-scrollbar {
                display: none;
                /* Chrome, Safari, Opera */
            }

            .product-card {
                flex: 0 0 auto;
                width: 280px;
                scroll-snap-align: start;
                border-radius: 20px;
            }

            .testimonials-heading {
                padding-left: 10px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }

            .container {
                width: 100%;
                padding: 10px 0;
                justify-content: flex-start;
            }

            .product-card {
                width: calc(50% - 10px); /* Show 2 videos per row with gap */
                max-width: 280px;
            }

            .testimonials-heading {
                font-size: 30px;
                margin-bottom: 20px;
                text-align: center;
            }

            .nav-arrow {
                width: 36px;
                height: 36px;
            }

            .nav-arrow.left {
                left: -10px;
            }

            .nav-arrow.right {
                right: -10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
                width: 100vw;
            }

            .container {
                width: 100%;
                padding: 10px 0;
                justify-content: flex-start; /* Changed from center to flex-start */
                gap: 8px; /* Reduced gap */
            }

            .product-card {
                width: calc(50% - 6px); /* Show 3 videos per row with smaller gap */
                max-width: 180px;
            }

            .play-button,
            .pause-button {
                width: 40px;
                height: 40px;
            }

            .play-button::after {
                border-top: 8px solid transparent;
                border-left: 16px solid #333;
                border-bottom: 8px solid transparent;
            }

            .pause-button::before,
            .pause-button::after {
                width: 4px;
                height: 16px;
            }

            .testimonials-heading {
                font-size: 24px;
                margin-bottom: 15px;
            }

            .nav-arrow {
                width: 32px;
                height: 32px;
            }

            .nav-arrow.left {
                left: -5px;
            }

            .nav-arrow.right {
                right: -5px;
            }
        }
    </style>
</head>

<body id="body-container">
    <h2 class="testimonials-heading">Testimonials</h2>

    <div class="container-wrapper">
        <!-- Navigation arrows - will be shown/hidden via JavaScript -->
        <button class="nav-arrow left" id="scroll-left" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
        <button class="nav-arrow right" id="scroll-right" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 18L15 12L9 6" stroke="#333" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>

        <div class="container" id="product-container">
            <!-- Product cards will be generated here by JavaScript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Simplified product data - just video URLs
            const videoUrls = [
                'https://storage.googleapis.com/alvista-videos/uploads/testing-review-video/Alvista%20Pradeep%20Kabra%20Reel%2001.mp4',
                'https://storage.googleapis.com/alvista-videos/uploads/testing-review-video/Alvista%20Pradeep%20Kabra%20Reel%2002.mp4',
                'https://storage.googleapis.com/alvista-videos/uploads/testing-review-video/GAUTAM%20RODE.mp4',
                'https://storage.googleapis.com/alvista-videos/uploads/testing-review-video/Noushin%20Alvista%20Reel.mp4'
            ];

            // Generate product cards
            const productContainer = document.getElementById('product-container');
            const videoElements = [];
            let currentlyPlaying = null;
            let fadeOutTimer = null;

            // Function to handle play/pause toggle
            function togglePlayPause(video, playButton, pauseButton) {
                // Clear any existing fade timer
                if (fadeOutTimer) {
                    clearTimeout(fadeOutTimer);
                    fadeOutTimer = null;
                }

                if (video.paused) {
                    // Pause any currently playing video
                    if (currentlyPlaying && currentlyPlaying !== video) {
                        currentlyPlaying.pause();
                        const currentCard = currentlyPlaying.closest('.product-card');
                        if (currentCard) {
                            const currentPlayBtn = currentCard.querySelector('.play-button');
                            const currentPauseBtn = currentCard.querySelector('.pause-button');
                            if (currentPlayBtn) {
                                currentPlayBtn.style.display = 'flex';
                                currentPlayBtn.classList.remove('fade-out');
                            }
                            if (currentPauseBtn) {
                                currentPauseBtn.style.display = 'none';
                                currentPauseBtn.classList.remove('fade-out');
                            }
                        }
                    }
                    
                    // Play this video
                    video.play().catch(error => console.log("Autoplay prevented:", error));
                    currentlyPlaying = video;
                    
                    // Show pause button, hide play button
                    playButton.style.display = 'none';
                    pauseButton.style.display = 'flex';
                    pauseButton.classList.remove('fade-out');
                    
                    // Fade out the pause button after 1.5 seconds
                    fadeOutTimer = setTimeout(() => {
                        pauseButton.classList.add('fade-out');
                    }, 1500);
                } else {
                    // Pause the video
                    video.pause();
                    currentlyPlaying = null;
                    
                    // Show play button, hide pause button
                    pauseButton.style.display = 'none';
                    playButton.style.display = 'flex';
                    playButton.classList.remove('fade-out');
                }
            }

            videoUrls.forEach((videoUrl, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.setAttribute('data-index', index);

                // Video container
                const videoContainer = document.createElement('div');
                videoContainer.className = 'video-container';

                // Video element
                const video = document.createElement('video');
                video.className = 'product-video';
                // Changed from muted to unmuted
                video.muted = false;
                video.loop = true;
                video.playsInline = true;
                // Fix for mobile video playback
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');

                const source = document.createElement('source');
                source.src = videoUrl;
                source.type = 'video/mp4';

                video.appendChild(source);
                video.appendChild(document.createTextNode('Your browser does not support the video tag.'));
                videoElements.push(video);

                videoContainer.appendChild(video);
                card.appendChild(videoContainer);

                // Play button - visible by default
                const playButton = document.createElement('div');
                playButton.className = 'play-button';
                playButton.style.display = 'flex';
                card.appendChild(playButton);

                // Pause button - hidden by default
                const pauseButton = document.createElement('div');
                pauseButton.className = 'pause-button';
                pauseButton.style.display = 'none';
                card.appendChild(pauseButton);

                // Add event listeners for play/pause functionality
                playButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePlayPause(video, playButton, pauseButton);
                });

                pauseButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePlayPause(video, playButton, pauseButton);
                });

                // Add click event to the entire card
                card.addEventListener('click', () => {
                    togglePlayPause(video, playButton, pauseButton);
                });

                // Fix for mobile touch events - simplified to work better
                card.addEventListener('touchend', (e) => {
                    // Prevent default to avoid any browser-specific behaviors
                    e.preventDefault();
                    // Simple toggle without timing checks
                    togglePlayPause(video, playButton, pauseButton);
                });

                // Show play button when video ends
                video.addEventListener('ended', () => {
                    if (fadeOutTimer) {
                        clearTimeout(fadeOutTimer);
                        fadeOutTimer = null;
                    }
                    pauseButton.style.display = 'none';
                    playButton.style.display = 'flex';
                    playButton.classList.remove('fade-out');
                    currentlyPlaying = null;
                });

                productContainer.appendChild(card);
            });

            // Check if we need to show navigation arrows (more than 4 videos)
            const scrollLeftBtn = document.getElementById('scroll-left');
            const scrollRightBtn = document.getElementById('scroll-right');

            if (videoUrls.length > 4) {
                scrollLeftBtn.style.display = 'flex';
                scrollRightBtn.style.display = 'flex';

                // Add event listeners for scroll buttons
                scrollLeftBtn.addEventListener('click', () => {
                    productContainer.scrollBy({ left: -300, behavior: 'smooth' });
                });

                scrollRightBtn.addEventListener('click', () => {
                    productContainer.scrollBy({ left: 300, behavior: 'smooth' });
                });
            }

            // Check for mobile device
            function isMobileDevice() {
                return (window.innerWidth <= 768) || 
                       (typeof window.orientation !== "undefined") || 
                       (navigator.userAgent.indexOf('IEMobile') !== -1);
            }

            // Apply mobile-specific adjustments
            if (isMobileDevice()) {
                document.body.classList.add('mobile-device');
                
                // Force container to show all videos by adjusting width
                const cards = document.querySelectorAll('.product-card');
                if (cards.length > 0 && window.innerWidth <= 480) {
                    // Make sure all videos are visible in the container
                    productContainer.style.width = '100%';
                    productContainer.style.overflowX = 'auto';
                }
            }

            // Improved mouse wheel horizontal scrolling
            // This is a more robust solution that works across browsers
            if (productContainer) {
                productContainer.addEventListener('wheel', function(event) {
                    // Prevent the default vertical scroll
                    event.preventDefault();
                    
                    // Calculate scroll amount - use deltaY for most browsers
                    const scrollAmount = event.deltaY || event.deltaX;
                    
                    // Apply the scroll to the container
                    productContainer.scrollLeft += scrollAmount;
                }, { passive: false });
            }

            // Add keyboard navigation for accessibility
            document.addEventListener('keydown', function(e) {
                if (document.activeElement === document.body) {
                    if (e.key === 'ArrowLeft') {
                        productContainer.scrollBy({ left: -100, behavior: 'smooth' });
                    } else if (e.key === 'ArrowRight') {
                        productContainer.scrollBy({ left: 100, behavior: 'smooth' });
                    }
                }
            });
        });
    </script>
</body>

</html>
